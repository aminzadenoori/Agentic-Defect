<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="960" height="480" fill="#fafbfc"/>

  <!-- Title -->
  <text x="480" y="34" font-size="18" font-weight="700" fill="#24292e" text-anchor="middle">MARQ — Multi-Agent Reasoning for Requirements Quality</text>
  <text x="480" y="54" font-size="12" fill="#586069" text-anchor="middle">Input: requirement text only (no weak-word hint).  Output: ok | defect + reasoning trace</text>

  <!-- Test requirement input -->
  <rect x="30" y="100" width="170" height="60" rx="10" fill="#ffffff" stroke="#0366d6" stroke-width="2"/>
  <text x="115" y="130" font-size="13" font-weight="700" fill="#0366d6" text-anchor="middle">Test requirement</text>
  <text x="115" y="148" font-size="10" fill="#586069" text-anchor="middle">"The system shall respond fast."</text>

  <!-- Pool input -->
  <rect x="30" y="200" width="170" height="60" rx="10" fill="#ffffff" stroke="#9900ff" stroke-width="2"/>
  <text x="115" y="226" font-size="13" font-weight="700" fill="#9900ff" text-anchor="middle">Example pool (30%)</text>
  <text x="115" y="244" font-size="10" fill="#586069" text-anchor="middle">requirement + weak words + label</text>

  <!-- Retriever -->
  <line x1="200" y1="130" x2="240" y2="160" stroke="#586069" stroke-width="2"/>
  <polygon points="237,162 245,165 244,157" fill="#586069"/>
  <line x1="200" y1="230" x2="240" y2="200" stroke="#586069" stroke-width="2"/>
  <polygon points="237,198 245,196 244,205" fill="#586069"/>

  <rect x="245" y="160" width="130" height="60" rx="10" fill="#fff8e6" stroke="#e69138" stroke-width="2"/>
  <text x="310" y="185" font-size="12" font-weight="700" fill="#24292e" text-anchor="middle">Retriever</text>
  <text x="310" y="201" font-size="9" fill="#586069" text-anchor="middle">(deterministic)</text>
  <text x="310" y="214" font-size="9" fill="#586069" text-anchor="middle">top-k dense retrieval</text>

  <!-- arrow to Scanner -->
  <line x1="375" y1="190" x2="410" y2="190" stroke="#586069" stroke-width="2"/>
  <polygon points="410,186 420,190 410,194" fill="#586069"/>

  <!-- Scanner -->
  <rect x="420" y="150" width="120" height="80" rx="10" fill="#e8f0fe" stroke="#0366d6" stroke-width="2"/>
  <text x="480" y="175" font-size="13" font-weight="700" fill="#24292e" text-anchor="middle">Scanner</text>
  <text x="480" y="193" font-size="9" fill="#586069" text-anchor="middle">finds candidate</text>
  <text x="480" y="206" font-size="9" fill="#586069" text-anchor="middle">ambiguity tokens</text>
  <text x="480" y="222" font-size="10" font-weight="700" fill="#0366d6" text-anchor="middle">1 LLM call</text>

  <!-- arrow to Investigators -->
  <line x1="540" y1="190" x2="580" y2="190" stroke="#586069" stroke-width="2"/>
  <polygon points="580,186 590,190 580,194" fill="#586069"/>

  <!-- Investigators (3 parallel boxes) -->
  <rect x="590" y="120" width="130" height="46" rx="8" fill="#e8f0fe" stroke="#0366d6"/>
  <text x="655" y="138" font-size="11" font-weight="700" fill="#24292e" text-anchor="middle">Investigator #1</text>
  <text x="655" y="156" font-size="9" fill="#586069" text-anchor="middle">"fast" — grounded?</text>

  <rect x="590" y="172" width="130" height="46" rx="8" fill="#e8f0fe" stroke="#0366d6"/>
  <text x="655" y="190" font-size="11" font-weight="700" fill="#24292e" text-anchor="middle">Investigator #2</text>
  <text x="655" y="208" font-size="9" fill="#586069" text-anchor="middle">"appropriate" — ?</text>

  <rect x="590" y="224" width="130" height="46" rx="8" fill="#e8f0fe" stroke="#0366d6"/>
  <text x="655" y="242" font-size="11" font-weight="700" fill="#24292e" text-anchor="middle">Investigator #N</text>
  <text x="655" y="260" font-size="9" fill="#586069" text-anchor="middle">parallel (1 call each)</text>

  <!-- arrow to Critic -->
  <line x1="720" y1="195" x2="760" y2="195" stroke="#586069" stroke-width="2"/>
  <polygon points="760,191 770,195 760,199" fill="#586069"/>

  <!-- Critic -->
  <rect x="770" y="160" width="120" height="70" rx="10" fill="#fde7e7" stroke="#cc0000" stroke-width="2"/>
  <text x="830" y="183" font-size="13" font-weight="700" fill="#24292e" text-anchor="middle">Critic</text>
  <text x="830" y="200" font-size="9" fill="#586069" text-anchor="middle">adversarial review</text>
  <text x="830" y="213" font-size="9" fill="#586069" text-anchor="middle">may force re-investigate</text>
  <text x="830" y="225" font-size="10" font-weight="700" fill="#cc0000" text-anchor="middle">1 LLM call</text>

  <!-- loop back arrow from Critic to Investigators -->
  <path d="M 770 230 Q 730 290 655 280 L 655 270" fill="none" stroke="#cc0000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="652,272 655,283 658,272" fill="#cc0000"/>
  <text x="710" y="320" font-size="9" fill="#cc0000" text-anchor="middle">one re-investigation round</text>

  <!-- arrow down to Synthesizer -->
  <line x1="830" y1="230" x2="830" y2="310" stroke="#586069" stroke-width="2"/>
  <polygon points="826,310 830,320 834,310" fill="#586069"/>

  <!-- Synthesizer -->
  <rect x="745" y="320" width="170" height="70" rx="10" fill="#e8f5e8" stroke="#38761d" stroke-width="2"/>
  <text x="830" y="346" font-size="13" font-weight="700" fill="#24292e" text-anchor="middle">Synthesizer</text>
  <text x="830" y="363" font-size="9" fill="#586069" text-anchor="middle">aggregate: any defect → defect</text>
  <text x="830" y="376" font-size="9" fill="#586069" text-anchor="middle">otherwise → ok</text>
  <text x="830" y="388" font-size="10" font-weight="700" fill="#38761d" text-anchor="middle">1 LLM call</text>

  <!-- Final output -->
  <line x1="745" y1="355" x2="490" y2="355" stroke="#586069" stroke-width="2"/>
  <polygon points="490,351 480,355 490,359" fill="#586069"/>

  <rect x="290" y="320" width="190" height="70" rx="10" fill="#ffffff" stroke="#24292e" stroke-width="2"/>
  <text x="385" y="346" font-size="13" font-weight="700" fill="#24292e" text-anchor="middle">Final prediction</text>
  <text x="385" y="363" font-size="10" fill="#586069" text-anchor="middle">verdict ∈ {ok, defect}</text>
  <text x="385" y="378" font-size="10" fill="#586069" text-anchor="middle">+ full reasoning trace</text>

  <!-- CSV output -->
  <line x1="290" y1="355" x2="250" y2="355" stroke="#586069" stroke-width="2"/>
  <polygon points="250,351 240,355 250,359" fill="#586069"/>

  <rect x="60" y="320" width="180" height="70" rx="10" fill="#f6f8fa" stroke="#d1d5da" stroke-width="2"/>
  <text x="150" y="346" font-size="13" font-weight="700" fill="#24292e" text-anchor="middle">Per-prediction CSV row</text>
  <text x="150" y="362" font-size="9" fill="#586069" text-anchor="middle">gold, pred, reasoning,</text>
  <text x="150" y="375" font-size="9" fill="#586069" text-anchor="middle">tokens, latency, retrieved IDs</text>
  <text x="150" y="388" font-size="9" font-style="italic" fill="#38761d" text-anchor="middle">→ feeds RQ5 human study</text>

  <!-- Legend bar -->
  <text x="30" y="440" font-size="11" font-weight="700" fill="#24292e">Cost per prediction:</text>
  <text x="160" y="440" font-size="11" fill="#24292e">3–6 LLM calls (vs. 1 for prompt baselines)</text>
  <text x="30" y="458" font-size="11" font-weight="700" fill="#24292e">Shared LLM backbone:</text>
  <text x="170" y="458" font-size="11" fill="#24292e">all five agents use the same model — fair model-by-model comparison</text>
</svg>
